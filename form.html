<!DOCTYPE html>
<html lang="en">
<head>
    <title>Company Level Task</title>
</head>
<body>

<center>
    <h1>Company Level Task</h1>

    <form method="post">
        <table cellpadding="10">

            <tr>
                <td>Name:</td>
                <td><input type="text" name="name" placeholder="Enter your name" required></td>
            </tr>

            <tr>
                <td>Date of Birth:</td>
                <td><input type="date" name="dob" required></td>
            </tr>

            <tr>
                <td>Gender:</td>
                <td>
                    <input type="radio" name="gender" value="Male"> Male
                    <input type="radio" name="gender" value="Female"> Female
                    </td>
            </tr>

            <tr>
                <td>Country:</td>
                <td>
                    <select name="country">
                        <option value="">Select a Country</option>
                        <option value="India">India</option>
                        <option value="USA">USA</option>
                        <option value="China">China</option>
                        <option value="UA">UA</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td>Technologies Known:</td>
                <td>
                    <input type="checkbox"  value="Python"> Python
                    <input type="checkbox"  value="Java"> Java
                    <input type="checkbox"  value="PHP"> PHP
                    <input type="checkbox"  value="HTML"> HTML
                </td>
            </tr>

            <tr>
                <td>Address:</td>
                <td>
                    <textarea name="address" rows="4" cols="30" placeholder="Enter your Address"></textarea>
                </td>
            </tr>

            <tr>
                <td colspan="2" align="center">
                    <button type="submit">Submit</button>
                </td>
            </tr>

        </table>
    </form>

</center>

</body>
</html>
